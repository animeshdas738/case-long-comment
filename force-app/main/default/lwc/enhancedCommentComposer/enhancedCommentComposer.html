<template>
  <div class="composer">
    <lightning-card>
      <div class="slds-p-around_small">
        <lightning-input rich-text value={bodyHtml} class="rte" label="Write a comment" onchange={handleRteChange}></lightning-input>

        <div class="slds-m-top_small">
          <lightning-file-upload
            label="Attach files"
            name="fileUploader"
            accept="*/*"
            record-id={recordId}
            onuploadfinished={handleUploadFinished}
          ></lightning-file-upload>
        </div>

        <div class="slds-m-top_small slds-grid slds-grid_align-end slds-gap_x-small">
          <lightning-button variant="neutral" label="Save Draft" onclick={handleSaveDraft}></lightning-button>
          <lightning-button variant="brand" label="Publish" onclick={handlePublish}></lightning-button>
        </div>
      </div>
    </lightning-card>
  </div>
</template>
