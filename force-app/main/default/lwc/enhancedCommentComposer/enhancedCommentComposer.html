<template>
  <div class="composer slds-p-around_small">
    <lightning-card>
      <div class="card-body slds-p-around_small">
        <lightning-input-rich-text value={bodyHtml} label="Write a comment" onchange={handleRteChange} class="rte"></lightning-input-rich-text>

        <div class="slds-m-top_small slds-grid slds-gutters">
          <div class="slds-col">
            <lightning-file-upload label="Attach files" name="fileUploader" accept="*/*" record-id={recordId} onuploadfinished={handleUploadFinished}></lightning-file-upload>
          </div>
          <div class="slds-col slds-text-align_right meta">
            <div class="char-count">{charCount} chars</div>
          </div>
        </div>

        <div class="slds-m-top_small slds-grid slds-grid_align-end slds-gap_x-small actions">
          <lightning-button variant="neutral" label="Save Draft" onclick={handleSaveDraft}></lightning-button>
          <lightning-button variant="brand" label="Publish" onclick={handlePublish} disabled={isPublishDisabled}></lightning-button>
        </div>
      </div>
    </lightning-card>
  </div>
</template>
