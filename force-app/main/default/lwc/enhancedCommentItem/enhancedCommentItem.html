<template>
  <div class="comment-item-card">
    <div class="card-inner" style="position: relative;">
          <div class="author-line">
            <div class="left-group">
              <div class="avatar">
                <lightning-avatar variant="circle" size="small" alternative-text={comment.AuthorName} initials={commentAuthorInitials} src={commentAuthorPhotoUrl}></lightning-avatar>
              </div>
              <div class="meta">
                <div class="author-name"><strong>{comment.AuthorName}</strong>
                  <template if:true={roleBadge}><span class="role-badge">{roleBadge}</span></template>
                  <template if:true={isDraft}><span class={statusClassName}>{statusLabel}</span></template>
                  <template if:true={isPublished}><span class={statusClassName}>{publishedLabel}</span></template>
                  <template if:true={isPrivate}>
                    <lightning-icon icon-name="utility:lock" alternative-text="Private" title="Private" class="lock-inline" size="x-small"></lightning-icon>
                  </template>
                  <span class="time-inline" title={formattedDateTitle}>{formattedDate}</span>
                </div>
              </div>
            </div>

            <div class="meta-right">
              <!-- Channel badge hidden for now -->
              <!-- <div class="slds-text-body_small slds-m-top_x-small"><span class="slds-badge channel-badge" data-channel-id={comment.Id}>{comment.Channel__c}</span></div> -->
            </div>
          </div>
          <div class="top-actions">
            <lightning-button-group>
              <template if:true={isDraft}>
                <lightning-button-icon icon-name="utility:check" alternative-text="Publish" title="Publish" onclick={handlePublish}></lightning-button-icon>
              </template>
              <template if:false={isDraft}>
                <lightning-button-icon icon-name={publicIconName} alternative-text={publicLabel} title={publicLabel} onclick={handleTogglePublic}></lightning-button-icon>
              </template>

              <lightning-button-icon icon-name="utility:archive" alternative-text="Archive" title="Archive" onclick={handleArchive}></lightning-button-icon>
              <lightning-button-icon icon-name="utility:down" alternative-text="More" title="More" onclick={handleMore}></lightning-button-icon>
            </lightning-button-group>
          </div>

      <div class="slds-m-top_small comment-body" lwc:dom="manual" data-id={comment.Id}></div>

      <template if:true={commentAttachments}>
        <div class="slds-m-top_small attachments">
          <template for:each={commentAttachments} for:item="att">
            <div key={att.ContentDocumentId} class="attachment-item slds-text-body_small">{att.Title}</div>
          </template>
        </div>
      </template>

      <template if:true={attachmentSummary}>
        <div class="attachment-summary">{attachmentSummary}</div>
      </template>

      <div class="slds-m-top_small actions">
        <a href="javascript:void(0)" class="action-link" onclick={handleReply}>Reply</a>
        <a href="javascript:void(0)" class="action-link" onclick={handleEdit}>Edit</a>
      </div>
    </div>
  </div>
</template>
