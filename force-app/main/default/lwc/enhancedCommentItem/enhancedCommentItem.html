<template>
  <div class="comment-item-card">
    <div class="card-inner" style="position: relative;">
      <lightning-layout horizontal-align="spread" vertical-align="start">
        <lightning-layout-item size="9">
          <div class="author-line" style="padding-left: 1rem;">
            <div class="left-group">
              <div class="avatar">
                <lightning-avatar variant="circle" size="small" alternative-text={comment.AuthorName} initials={commentAuthorInitials} src={commentAuthorPhotoUrl}></lightning-avatar>
              </div>
              <div class="meta">
                <div class="author-name"><strong>{comment.AuthorName}</strong>
                  <template if:true={roleBadge}><span class="role-badge">{roleBadge}</span></template>
                  <template if:true={isDraft}><span class={statusClassName}>{statusLabel}</span></template>
                  <template if:true={isPublished}><span class={statusClassName}>{publishedLabel}</span></template>
                  <template if:true={isPrivate}>
                    &nbsp;&nbsp;<lightning-icon icon-name="utility:lock" alternative-text="Private" title="Private" class="lock-inline" size="x-small"></lightning-icon>
                  </template>
                  <span class="time-inline" title={formattedDateTitle}>{formattedDate}</span>
                </div>
              </div>
            </div>

            <div class="meta-right">
              <!-- Channel badge hidden for now -->
              <!-- <div class="slds-text-body_small slds-m-top_x-small"><span class="slds-badge channel-badge" data-channel-id={comment.Id}>{comment.Channel__c}</span></div> -->
            </div>
          </div>
        </lightning-layout-item>
        <lightning-layout-item size="3">
          <div class="top-actions" style="text-align:right">
            <lightning-button-group>
              <lightning-button-icon icon-name="utility:edit" alternative-text="Edit" title="Edit" onclick={toggleEdit} size="smalll"></lightning-button-icon>
              <template if:true={isDraft}>
                <lightning-button-icon icon-name="utility:check" alternative-text="Publish" title="Publish" onclick={handlePublish} size="smalll"></lightning-button-icon>
              </template>
              <template if:false={isDraft}>
                <lightning-button-icon icon-name={publicIconName} alternative-text={publicLabel} title={publicLabel} onclick={handleTogglePublic} size="smalll"></lightning-button-icon>
              </template>

              <lightning-button-icon icon-name="utility:archive" alternative-text="Archive" title="Archive" onclick={handleArchive} size="smalll"></lightning-button-icon>
              <!--<lightning-button-icon icon-name="utility:down" alternative-text="More" title="More" onclick={handleMore}></lightning-button-icon>-->
            </lightning-button-group>
          </div>
        </lightning-layout-item>
      </lightning-layout>
          
      <div class="slds-m-top_small comment-body" lwc:dom="manual" data-id={comment.Id}></div>

      <template if:true={commentAttachments}>
        <div class="slds-m-top_small attachments">
          <template for:each={commentAttachments} for:item="att">
            <div key={att.ContentDocumentId} class="attachment-item slds-text-body_small">{att.Title}</div>
          </template>
        </div>
      </template>

      <template if:true={attachmentSummary}>
        <div class="attachment-summary">{attachmentSummary}</div>
      </template>

      <!-- Inline edit mode (do not prefill existing text) -->
      <template if:true={isEditing}>
        <div class="edit-area slds-m-top_small">
          <lightning-input-rich-text value={editHtml} onchange={handleEditChange}></lightning-input-rich-text>
          <div class="slds-m-top_small">
            <lightning-button variant="brand" label="Save" onclick={saveEdit}></lightning-button>
            <lightning-button variant="neutral" label="Cancel" onclick={cancelEdit}></lightning-button>
          </div>
        </div>
      </template>
    </div>
  </div>
</template>
