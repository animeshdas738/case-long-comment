<template>
  <div class="timeline">
    <lightning-card>
      <div class="slds-p-around_small">
        <div class="slds-grid slds-wrap slds-gutters">
          <div class="slds-col slds-size_1-of-2">
            <lightning-input type="search" placeholder="Search comments" onchange={handleSearch}></lightning-input>
          </div>
          <div class="slds-col slds-size_1-of-2 slds-text-align_right">
            <lightning-combobox label="Page size" value={pageSize} options={pageSizeOptions} onchange={handlePageSizeChange}></lightning-combobox>
          </div>
        </div>

        <div class="slds-m-top_small comments-list">
          <template if:true={comments}>
            <template for:each={comments} for:item="c">
              <c-enhanced-comment-item key={c.Id} comment={c}></c-enhanced-comment-item>
            </template>
          </template>
          <template if:false={comments}>
            <div class="slds-text-body_small">No comments</div>
          </template>
        </div>

        <div class="slds-m-top_small slds-grid slds-grid_align-spread">
          <lightning-button label="Previous" onclick={handlePrev} disabled={isPrevDisabled}></lightning-button>
          <lightning-button label="Next" onclick={handleNext} disabled={isNextDisabled}></lightning-button>
        </div>
      </div>
    </lightning-card>
  </div>
</template>
