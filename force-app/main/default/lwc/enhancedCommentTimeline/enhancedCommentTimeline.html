<template>
  <div class="timeline slds-p-around_small">
    <lightning-card>
      <div class="slds-p-around_small">
        <div class="header slds-grid slds-grid_align-spread slds-align_absolute-center slds-m-bottom_small">
          <div class="title slds-text-heading_small">Case Comments</div>
          <div class="controls slds-grid slds-align_middle slds-gap_x-small">
            <span class="count slds-badge">{commentsCountLabel}</span>
            <lightning-input type="search" placeholder="Search comments" onchange={handleSearch}></lightning-input>
            <lightning-combobox label="Page size" value={pageSize} options={pageSizeOptions} onchange={handlePageSizeChange}></lightning-combobox>
          </div>
        </div>

        <div class="slds-m-top_small comments-list timeline-rail">
          <template if:true={comments}>
            <template for:each={comments} for:item="c">
              <div key={c.Id} class="timeline-node">
                <div class="marker" aria-hidden="true"></div>
                <div class="node-content">
                  <c-enhanced-comment-item comment={c} onreply={handleReplyEvent} onedit={handleEditEvent}></c-enhanced-comment-item>
                </div>
              </div>
            </template>
          </template>
          <template if:false={comments}>
            <div class="slds-text-body_small">No comments</div>
          </template>
        </div>

        <div class="slds-m-top_small slds-grid slds-grid_align-spread pagination">
          <lightning-button label="Previous" onclick={handlePrev} disabled={isPrevDisabled}></lightning-button>
          <lightning-button label="Next" onclick={handleNext} disabled={isNextDisabled}></lightning-button>
        </div>
      </div>
    </lightning-card>
  </div>
</template>
