<template>
  <div class="timeline slds-p-around_small">
    <lightning-card>
      <div class="slds-p-around_small">
        <div class="header slds-grid slds-grid_align-spread slds-align_absolute-center slds-m-bottom_small">
          <div class="title slds-text-heading_small">Case Comments</div>
          <div class="controls slds-grid slds-align_middle slds-gap_x-small">
            <span class="count compact slds-badge">{commentsCountLabel}</span>
            <lightning-input type="search" placeholder="Search comments" onchange={handleSearch} variant="label-hidden"></lightning-input>
            <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" title="Refresh" onclick={handleRefresh} class="refresh-icon"></lightning-button-icon>
          </div>
        </div>

  <div class="slds-m-top_small comments-list timeline-rail" style="max-height: 60vh; overflow: auto;">
          <template if:true={comments}>
            <template for:each={comments} for:item="c">
              <div key={c.Id} class="timeline-node">
                <div class="marker" aria-hidden="true">{c.Comment_Number__c}</div>
                <div class="node-content">
                  <c-enhanced-comment-item comment={c} onreply={handleReplyEvent} onedit={handleEditEvent}></c-enhanced-comment-item>
                </div>
              </div>
            </template>
          </template>
          <template if:false={comments}>
            <div class="slds-text-body_small">No comments</div>
          </template>
        </div>

        <div class="slds-m-top_x-small slds-p-vertical_small load-indicator">
          <template if:true={loading}>
            <div class="slds-spinner slds-spinner_small slds-spinner_inline" role="status"><span class="slds-assistive-text">Loading</span></div>
            <span class="slds-m-left_small">Loading more comments…</span>
          </template>
          <template if:false={hasMore}>
            <div class="slds-text-body_small slds-text-align_center">End of comments</div>
          </template>
        </div>

        <!-- Pagination removed in favor of lazy loading -->
      </div>
    </lightning-card>
  </div>
</template>
